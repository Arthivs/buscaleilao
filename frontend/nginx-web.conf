server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web — todas as rotas caem em index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|wasm|svg|ttf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: leilao_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leilao_inteligente}
      POSTGRES_USER: ${POSTGRES_USER:-leilao_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-leilao_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leilao_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leilao_net

  redis:
    image: redis:7-alpine
    container_name: leilao_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leilao_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leilao_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-leilao_user}:${POSTGRES_PASSWORD:-leilao_pass}@postgres:5432/${POSTGRES_DB:-leilao_inteligente}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecret_change_in_production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - ./backend:/app
      - crawler_cache:/app/crawler_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leilao_net
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leilao_celery
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-leilao_user}:${POSTGRES_PASSWORD:-leilao_pass}@postgres:5432/${POSTGRES_DB:-leilao_inteligente}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecret_change_in_production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app
      - crawler_cache:/app/crawler_cache
    depends_on:
      - postgres
      - redis
    networks:
      - leilao_net
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leilao_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-leilao_user}:${POSTGRES_PASSWORD:-leilao_pass}@postgres:5432/${POSTGRES_DB:-leilao_inteligente}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecret_change_in_production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - leilao_net
    restart: unless-stopped

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leilao_flower
    command: celery -A app.tasks.celery_app flower --port=5555
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - leilao_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leilao_frontend
    ports:
      - "3000:80"
    networks:
      - leilao_net
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: leilao_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - leilao_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  crawler_cache:

networks:
  leilao_net:
    driver: bridge
